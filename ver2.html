<!DOCTYPE html><html lang="en"><head>    <meta name="robots" content="noindex, nofollow, noarchive">    <meta charset="UTF-8">    <title>B&S – Pallet Calculator/ Aanmelden</title>    <meta name="viewport" content="width=device-width, initial-scale=1.0">    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>    <style>        body { margin:0; padding:20px; font-family: Arial,sans-serif; }        h1 { text-align:center; color:#007bff; }        .upload-container { display: flex; justify-content: space-between; max-width: 1240px; margin: 20px auto; gap: 20px; }        .drop-zone { flex: 1; border:2px dashed #007bff; border-radius:8px; padding:40px; text-align:center; cursor:pointer; }        .drop-zone.dragover { background-color:#f0f8ff; }        .buttons { text-align:center; margin:20px 0; }        .buttons button { margin:0 10px; padding:10px 20px; font-size:15px; cursor:pointer; }        .transport { border:1px solid #ddd; border-radius:6px; padding:15px; margin-bottom:20px; }        table { width:100%; border-collapse:collapse; margin-top:10px; }        th,td { border:1px solid #ddd; padding:8px; text-align:center; }        th { background-color:#007bff; color:white; }        .status { text-align:center; margin-top:15px; font-weight:bold; }        .send-button { margin-top:10px; padding:6px 12px; cursor:pointer; }        .badge-reduced { background-color: #dc3545; color: white; padding: 2px 6px; border-radius: 4px; font-size: 12px; font-weight: bold; }        .badge-increased { background-color: #28a745; color: white; padding: 2px 6px; border-radius: 4px; font-size: 12px; font-weight: bold; }    </style></head><body><h1>Pallet Calculator/Aanmelden</h1><div class="upload-container">    <div class="drop-zone" id="dropZoneOld">        Upload Old/Base File<br>        or click to select        <input type="file" id="fileInputOld" accept=".xlsx,.xls,.csv" hidden>    </div>    <div class="drop-zone" id="dropZoneNew">        Upload New/Updated File<br>        or click to select        <input type="file" id="fileInputNew" accept=".xlsx,.xls,.csv" hidden>    </div></div><div class="buttons">    <button onclick="filterMeeder()">Meeder</button>    <button onclick="filterSump()">Sump</button></div><div class="status" id="status"></div><div id="output"></div><script>let allTransports = {};let oldTransports = null;let newTransports = null;const dropZoneOld = document.getElementById("dropZoneOld");const fileInputOld = document.getElementById("fileInputOld");const dropZoneNew = document.getElementById("dropZoneNew");const fileInputNew = document.getElementById("fileInputNew");const status = document.getElementById("status");const output = document.getElementById("output");dropZoneOld.addEventListener("click", ()=>fileInputOld.click());dropZoneOld.addEventListener("dragover", e=>{ e.preventDefault(); dropZoneOld.classList.add("dragover"); });dropZoneOld.addEventListener("dragleave", ()=>dropZoneOld.classList.remove("dragover"));dropZoneOld.addEventListener("drop", e=>{ e.preventDefault(); dropZoneOld.classList.remove("dragover"); handleFile(e.dataTransfer.files[0], "old"); });fileInputOld.addEventListener("change", e=>handleFile(e.target.files[0], "old"));dropZoneNew.addEventListener("click", ()=>fileInputNew.click());dropZoneNew.addEventListener("dragover", e=>{ e.preventDefault(); dropZoneNew.classList.add("dragover"); });dropZoneNew.addEventListener("dragleave", ()=>dropZoneNew.classList.remove("dragover"));dropZoneNew.addEventListener("drop", e=>{ e.preventDefault(); dropZoneNew.classList.remove("dragover"); handleFile(e.dataTransfer.files[0], "new"); });fileInputNew.addEventListener("change", e=>handleFile(e.target.files[0], "new"));function handleFile(file, type){    if(!file) return;    status.textContent=`Processing ${type} file...`;    const reader = new FileReader();    reader.onload = e=>{        const wb = XLSX.read(new Uint8Array(e.target.result),{type:"array"});        const sheet = wb.Sheets[wb.SheetNames[0]];        const rows = XLSX.utils.sheet_to_json(sheet,{header:1});        const processed = processData(rows);                if(type === "old") {            oldTransports = processed;            dropZoneOld.style.borderColor = "#28a745";        } else {            newTransports = processed;            dropZoneNew.style.borderColor = "#28a745";        }                if(oldTransports && newTransports) {            compareTransports();        } else {            allTransports = processed;            render(allTransports);            status.textContent = `${type === "old" ? "Old" : "New"} file loaded. Waiting for the other file to compare.`;        }    };    reader.readAsArrayBuffer(file);}function parseEuroNumber(v){    if(typeof v==="number") return v;    return parseFloat(String(v).replace(/\./g,"").replace(",", ".")) || 0;}function parseExcelDate(v){    if(typeof v==="number"){        const d = XLSX.SSF.parse_date_code(v);        return `${String(d.d).padStart(2,"0")}-${String(d.m).padStart(2,"0")}-${d.y}`;    }    return v || "";}function shipmentType(id){    if(id==="GTC") return { type:"Dry", remark:"" };    if(id==="GTC/K") return { type:"Chilled", remark:"" };    if(id==="GTC/V") return { type:"Frozen", remark:"" };    if(id==="NO9/GTC/V") return { type:"VE", remark:"" };    if(id==="CSD/V") return { type:"Frozen", remark:"CSD" };    if(id==="NO9/CSD/V") return { type:"VE", remark:"CSD" };    return null;}function calculatePallets(m3){    if (m3 <= 1.5) return 1;    return Math.max(2, Math.round(m3 / 1.4));}function processData(rows){    let headerRowIdx = 0;    for (let i = 0; i < Math.min(rows.length, 15); i++) {        if (rows[i] && rows[i].includes("Transport no.")) {            headerRowIdx = i;            break;        }    }    const headers = rows[headerRowIdx] || [];    const data = rows.slice(headerRowIdx + 1);    const idx = {        shipment: headers.indexOf("Shipment identifier"),        transport: headers.indexOf("Transport no."),        transportShipment: headers.indexOf("Transport shipment"),        date: headers.indexOf("Delivery date customer"),        destination: headers.indexOf("Destination"),        kg: headers.indexOf("Expected kg gross"),        m3: headers.indexOf("Expected mtr3")    };    let transportsResult = {};    data.forEach(r=>{        const no = r[idx.transport];        const info = shipmentType(r[idx.shipment]);        if(!no || !info) return;        const kg = parseEuroNumber(r[idx.kg]);        const m3 = parseEuroNumber(r[idx.m3]);        if(kg === 0 && m3 === 0) return;        if(!transportsResult[no]){            transportsResult[no] = {                destination: r[idx.destination],                deliveryDate: parseExcelDate(r[idx.date]),                shipments: {}            };        }        const key = info.type + "|" + info.remark;        if(!transportsResult[no].shipments[key]){            transportsResult[no].shipments[key] = {                type: info.type,                remark: info.remark,                kg: 0,                m3: 0,                transportShipment: ""            };        }        const s = transportsResult[no].shipments[key];        s.kg += kg;        s.m3 += m3;        s.transportShipment = r[idx.transportShipment] || "";    });    return transportsResult;}function compareTransports(){    let filteredDifferences = {};    const allTransportNos = new Set([...Object.keys(oldTransports), ...Object.keys(newTransports)]);        allTransportNos.forEach(no => {        const oldT = oldTransports[no];        const newT = newTransports[no];                let oldTotalPallets = 0;        let newTotalPallets = 0;                if(oldT) {            Object.values(oldT.shipments).forEach(v => {                oldTotalPallets += calculatePallets(v.m3);            });        }        if(newT) {            Object.values(newT.shipments).forEach(v => {                newTotalPallets += calculatePallets(v.m3);            });        }                if(Math.abs(newTotalPallets - oldTotalPallets) >= 1) {            if(newT && newTotalPallets > 0) {                let updatedShipments = {};                const allKeys = new Set([...Object.keys(oldT ? oldT.shipments : {}), ...Object.keys(newT.shipments)]);                let hasActualRowChange = false;                                allKeys.forEach(key => {                    const oldS = oldT && oldT.shipments[key] ? oldT.shipments[key] : null;                    const newS = newT.shipments[key] ? newT.shipments[key] : null;                                        const op = oldS ? calculatePallets(oldS.m3) : 0;                    const np = newS ? calculatePallets(newS.m3) : 0;                                        // Only handle rows where there's an actual fluctuation in pallet count                    if (op !== np) {                        hasActualRowChange = true;                                                if (newS) {                            let displayType = newS.type;                            if (np < op) displayType = `📉 [REDUCED] ${newS.type}`;                            if (np > op && op > 0) displayType = `📈 [INCREASED] ${newS.type}`;                                                        updatedShipments[key] = {                                ...newS,                                type: displayType,                                oldPalletsCount: op                            };                        } else if (oldS) {                            // Item was completely removed from this transport                            updatedShipments[key] = {                                type: `❌ [REMOVED] ${oldS.type}`,                                remark: oldS.remark,                                kg: 0,                                m3: 0,                                transportShipment: oldS.transportShipment,                                oldPalletsCount: op                            };                        }                    }                });                                if (hasActualRowChange) {                    filteredDifferences[no] = {                        ...newT,                        shipments: updatedShipments                    };                }            } else {                filteredDifferences[no] = {                    destination: oldT ? oldT.destination : "Unknown Location",                    deliveryDate: oldT ? oldT.deliveryDate : "Unknown Date",                    shipments: {                        "Removed|": {                            type: "Order Cancelled / Removed or moved to another date",                            remark: "",                            kg: 0,                            m3: 0,                            transportShipment: "",                            oldPalletsCount: oldTotalPallets                        }                    }                };            }        }    });        allTransports = filteredDifferences;    render(allTransports);    status.textContent = "Comparison complete. Displaying orders with pallet differences.";}function render(transports){    output.innerHTML="";    Object.entries(transports).forEach(([no,t])=>{        const div=document.createElement("div");        div.className="transport";                let tableRows = Object.values(t.shipments).map(v=>{            const currentPallets = calculatePallets(v.m3);            let palletDisplay = "";                        if (v.oldPalletsCount !== undefined && v.oldPalletsCount !== currentPallets) {                palletDisplay = `${v.oldPalletsCount} ➡️ ${currentPallets}`;            } else {                palletDisplay = `${currentPallets}`;            }                        return `                <tr>                    <td>${v.type}${v.remark ? " ("+v.remark+")" : ""}</td>                    <td>${v.kg.toFixed(2)}</td>                    <td>${v.m3.toFixed(2)}</td>                    <td><strong>${palletDisplay}</strong></td>                </tr>`;        }).join("");                div.innerHTML=`<strong>${no} / ${t.destination} / Delivery customer ${t.deliveryDate}</strong>            <table>                <tr><th>Type</th><th>Kg</th><th>M3</th><th>Pallets (Old ➡️ New)</th></tr>                ${tableRows}            </table>`;        output.appendChild(div);    });}function filterMeeder(){    const filtered = {};    let emailText = `Hi,\n\nWanneer laden? Graag per boot opgeven:\n\n`;    const transportNumbers = [];    Object.entries(allTransports)        .sort((a,b)=>new Date(a[1].deliveryDate.split("-").reverse().join("-")) - new Date(b[1].deliveryDate.split("-").reverse().join("-")))        .forEach(([no,t])=>{            if(t.destination.toLowerCase().includes("meeder")){                filtered[no]=t;                transportNumbers.push(no);                emailText += `${no} / ${t.destination} / Delivery customer ${t.deliveryDate}\n`;                Object.values(t.shipments).forEach(v=>{                    emailText += `- ${no}-${v.transportShipment} ${v.type}${v.remark ? " ("+v.remark+")" : ""}: ${v.kg.toFixed(2)} kg / ${v.m3.toFixed(2)} m3 / ${calculatePallets(v.m3)} pallets\n`;                });                emailText += "Loading date:\n\n";            }        });    render(filtered);    status.textContent="Meeder transports filtered & email generated";    if(transportNumbers.length){        window.prompt("Copy all Meeder transport numbers:", transportNumbers.join(";"));    }    window.location.href=`mailto:export@europeancruiselogistics.com?body=${encodeURIComponent(emailText)}`;}function filterSump(){    const filtered={};    Object.entries(allTransports).forEach(([no,t])=>{        if(t.destination.toLowerCase().includes("sump")){            filtered[no]=t;        }    });    output.innerHTML="";    Object.entries(filtered).forEach(([no,t])=>{        const div=document.createElement("div");        div.className="transport";                let tableRows = Object.values(t.shipments).map(v=>{            const currentPallets = calculatePallets(v.m3);            let palletDisplay = v.oldPalletsCount !== undefined && v.oldPalletsCount !== currentPallets ? `${v.oldPalletsCount} -> ${currentPallets}` : `${currentPallets}`;            return `                <tr>                    <td>${v.type}${v.remark ? " ("+v.remark+")" : ""}</td>                    <td>${v.kg.toFixed(2)}</td>                    <td>${v.m3.toFixed(2)}</td>                    <td><strong>${palletDisplay}</strong></td>                </tr>`;        }).join("");                div.innerHTML=`<strong>${no} / ${t.destination} / Delivery customer ${t.deliveryDate}</strong>            <table>                <tr><th>Type</th><th>Kg</th><th>M3</th><th>Pallets (Old -> New)</th></tr>                ${tableRows}            </table>`;        const btn=document.createElement("button");        btn.textContent="Send to Sump";        btn.className="send-button";        btn.onclick=()=>exportSumpExcel(no);        div.appendChild(btn);        output.appendChild(div);    });    status.textContent="Sump transports filtered";}function exportSumpExcel(transportNo){    const t = allTransports[transportNo];    if(!t) return;    const rows =
